    --pop-bg: #FFFFFF; --pop-border: rgba(0,0,0,0.10); --link: #2563EB; --pop-ink: #16161A; --pop-ink-soft: #71717A;
    --pattern-op: 0.05;
    --sh: 0 1px 2px rgba(17,17,20,0.05), 0 12px 26px -16px rgba(17,17,20,0.22);
    --sh-lift: 0 2px 8px rgba(17,17,20,0.08), 0 30px 50px -20px rgba(17,17,20,0.32);
    --sh-pop: 0 10px 34px -8px rgba(17,17,20,0.24);
  }
  :root[data-theme="dark"] {
    --ground-1: #0C0C0E; --ground-2: #050506;
    --chrome-bg: rgba(20,20,22,0.6); --chrome-border: rgba(255,255,255,0.08);
    --ink: #F4F4F6; --ink-soft: #8A8A93; --ink-body: #C4C4CC;
    --accent: #F2C94C; --accent-ink: #2E2404;
    --card: #1C1C1F; --card-border: rgba(255,255,255,0.07); --hair: rgba(255,255,255,0.07);
    --pill: rgba(255,255,255,0.10);
    --pop-bg: #26262A; --pop-border: rgba(255,255,255,0.12); --link: #7BB0FF; --pop-ink: #F4F4F6; --pop-ink-soft: #8A8A93;
    --pattern-op: 0.10;
    --sh: 0 1px 2px rgba(0,0,0,0.5), 0 14px 30px -16px rgba(0,0,0,0.7);
    --sh-lift: 0 2px 10px rgba(0,0,0,0.6), 0 34px 58px -20px rgba(0,0,0,0.8);
    --sh-pop: 0 14px 40px -8px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  #desk {
    position: fixed; inset: 0; overflow: hidden;
    background: radial-gradient(130% 100% at 50% -10%, var(--ground-1), var(--ground-2) 100%);
    font-family: -apple-system, "SF Pro Text", ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    color: var(--ink); -webkit-user-select: none; user-select: none; touch-action: none;
  }
  #desk::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: var(--pattern-op);
    background-size: 148px 148px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='148' height='148'><g stroke='%23808080' stroke-width='1.3' stroke-linecap='round' fill='none'><path d='M21 29l10 10M31 29l-10 10'/><path d='M99 17l10 10M109 17l-10 10'/><path d='M61 75l10 10M71 75l-10 10'/><path d='M119 105l10 10M129 105l-10 10'/><path d='M29 119l10 10M39 119l-10 10'/></g></svg>");
  }

  /* ---------- chrome ---------- */
  #bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9000;
    display: flex; align-items: center; gap: 12px; padding: 12px 18px;
    background: var(--chrome-bg); border-bottom: 1px solid var(--chrome-border);
    -webkit-backdrop-filter: saturate(1.7) blur(22px); backdrop-filter: saturate(1.7) blur(22px);
  }
  #brand { display: flex; align-items: center; gap: 10px; margin-right: auto; }
  #brand .dot { width: 16px; height: 16px; border-radius: 5px; background: var(--accent); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
  #brand .mark { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }

  /* per-note type dropdown (hover-only tool) + task/calendar bodies */
  .note .tools-left { display: flex; margin-right: auto; }
  .tool.typetool svg { width: 16px; height: 16px; }
  .note .tp { position: absolute; top: 38px; left: 8px; z-index: 42; width: 138px; background: var(--pop-bg); border: 1px solid var(--pop-border); border-radius: 12px; box-shadow: var(--sh-pop); padding: 5px; display: none; animation: mpop .16s ease; }
  .note.type-open .tp { display: block; }
  .note .tp button { width: 100%; text-align: left; border: none; background: transparent; color: var(--pop-ink); font: inherit; font-size: 13px; padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .note .tp button:hover { background: color-mix(in srgb, var(--pop-ink) 9%, transparent); }
  .note .tp button .tick { opacity: 0; color: var(--accent); font-size: 12px; }
  .note .tp button.sel .tick { opacity: 1; }
  .note .ntbody { flex: 1 1 auto; display: flex; flex-direction: column; gap: 9px; overflow-y: auto; min-height: 0; }
  .note .ntadd { display: flex; gap: 6px; }
  .note .ntadd.cal { flex-wrap: wrap; }
  .note .ntinput { flex: 1; min-width: 90px; height: 32px; border: 1px solid var(--hair); border-radius: 9px; background: color-mix(in srgb, var(--ink) 4%, transparent); color: var(--ink); font: inherit; font-size: 13px; padding: 0 10px; outline: none; }
  .note .ntinput:focus { border-color: var(--accent); }
  .note .ntdate, .note .nttime { height: 32px; border: 1px solid var(--hair); border-radius: 9px; background: color-mix(in srgb, var(--ink) 4%, transparent); color: var(--ink); font: inherit; font-size: 12px; padding: 0 6px; outline: none; }
  .note .ntlist { display: flex; flex-direction: column; gap: 7px; }
  .note .ntrow { display: flex; align-items: center; gap: 9px; }
  .note .ntrow .cbox2 { width: 17px; height: 17px; }
  .note .ntrow .cbox2::after { left: 5px; top: 2px; }
  .note .nttext { flex: 1; font-size: 13.5px; min-width: 0; overflow-wrap: anywhere; }
  .note .ntrow.done .nttext { text-decoration: line-through; opacity: .5; }
  .note .tkedit { flex: 1; min-width: 0; font-size: 13.5px; line-height: 1.5; outline: none; overflow-wrap: anywhere; cursor: text; }
  .note .tkedit:empty::before { content: "New task"; color: color-mix(in srgb, var(--ink) 34%, transparent); }
  .note .ntrow.done .tkedit { text-decoration: line-through; opacity: .5; }
  .note .ntrow .taskdel { opacity: 0; transition: opacity .12s ease; }
  .note .ntrow:hover .taskdel { opacity: 1; }
  .note .remwhen { font-size: 11.5px; color: var(--accent); font-weight: 600; min-width: 46px; flex: 0 0 auto; font-variant-numeric: tabular-nums; }
  .note .calbody { gap: 8px; }
  .note .ncalhead { display: flex; align-items: center; justify-content: space-between; }
  .note .ncalmonth { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .note .ncalnav { border: none; background: transparent; color: var(--ink); font-size: 17px; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; line-height: 1; }
  .note .ncalnav:hover { background: color-mix(in srgb, var(--ink) 10%, transparent); }
  .note .ncalgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .note .ncaldow { text-align: center; font-size: 9px; font-weight: 700; color: var(--ink-soft); padding-bottom: 2px; }
  .note .ncalcell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11.5px; border-radius: 7px; cursor: pointer; position: relative; font-variant-numeric: tabular-nums; }
  .note .ncalcell:hover { background: color-mix(in srgb, var(--ink) 9%, transparent); }
  .note .ncalcell.pad { cursor: default; }
  .note .ncalcell.pad:hover { background: transparent; }
  .note .ncalcell.today { color: var(--accent); font-weight: 700; }
  .note .ncalcell.sel { background: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .note .ncaldot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .note .ncalcell.sel .ncaldot { background: var(--accent-ink); }
  .note .ncalday { border-top: 1px solid var(--hair); padding-top: 9px; display: flex; flex-direction: column; gap: 7px; }
  .note .ncaldayhead { font-size: 12.5px; font-weight: 700; }
  .note .ncalempty { font-size: 12px; color: var(--ink-soft); padding: 2px; }
  .note .dhead { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .note .dtitle { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .note .dallday { margin-bottom: 6px; }
  .note .dtimeline { display: flex; flex-direction: column; }
  .note .dslot { display: flex; gap: 8px; align-items: flex-start; min-height: 30px; padding: 4px 0; border-top: 1px solid var(--hair); cursor: pointer; }
  .note .dslot:hover { background: color-mix(in srgb, var(--ink) 4%, transparent); }
  .note .dslottime { flex: 0 0 42px; font-size: 10.5px; color: var(--ink-soft); font-weight: 600; padding-top: 3px; text-align: right; font-variant-numeric: tabular-nums; }
  .note .dslotbody { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; min-height: 22px; }
  .note .dchip { display: flex; align-items: center; gap: 6px; background: color-mix(in srgb, var(--accent) 20%, transparent); border-radius: 8px; padding: 4px 8px; }
  .note .dchiptext { flex: 1; font-size: 12.5px; overflow-wrap: anywhere; }
  .note .dchip .taskdel { width: 20px; height: 20px; color: var(--ink-soft); }
  .note .dslotinput { height: 28px; font-size: 12.5px; }
  .note .ntrow .taskdel { color: var(--ink-soft); width: 24px; height: 24px; }
  .note.nofoot .foot { display: none; }
  .note.nofoot { min-height: 156px; }

  .view { position: fixed; inset: 0; z-index: 5; display: none; overflow-y: auto; padding: 74px 24px 48px;
    background: radial-gradient(130% 100% at 50% -10%, var(--ground-1), var(--ground-2) 100%);
    font-family: -apple-system, "SF Pro Text", ui-sans-serif, system-ui, sans-serif; color: var(--ink); }
  .view.active { display: block; }
  .panel { max-width: 640px; margin: 0 auto; }
  .panelTitle { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 18px; }
  .taskadd { display: flex; gap: 8px; margin-bottom: 16px; }
  .taskinput { flex: 1; height: 42px; border: 1px solid var(--card-border); border-radius: 12px; background: var(--card); color: var(--ink); font: inherit; font-size: 14px; padding: 0 14px; outline: none; }
  .taskinput:focus { border-color: var(--accent); }
  .timeinput { height: 42px; border: 1px solid var(--card-border); border-radius: 12px; background: var(--card); color: var(--ink); font: inherit; padding: 0 8px; outline: none; }
  .tasklist { display: flex; flex-direction: column; gap: 8px; }
  .taskrow { display: flex; align-items: center; gap: 12px; padding: 13px 15px; background: var(--card); border: 1px solid var(--card-border); border-radius: 13px; box-shadow: var(--sh); }
  .cbox2 { width: 20px; height: 20px; border-radius: 6px; border: 1.8px solid color-mix(in srgb, var(--ink) 40%, transparent); cursor: pointer; flex: 0 0 auto; position: relative; transition: background .15s ease, border-color .15s ease; }
  .cbox2:hover { border-color: var(--accent); }
  .taskrow.done .cbox2 { background: var(--accent); border-color: var(--accent); }
  .taskrow.done .cbox2::after { content: ""; position: absolute; left: 6px; top: 2.5px; width: 4px; height: 9px; border: solid var(--accent-ink); border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .tasktext { flex: 1; font-size: 14.5px; min-width: 0; overflow-wrap: anywhere; }
  .taskrow.done .tasktext { text-decoration: line-through; opacity: .5; }
  .taskdel { border: none; background: transparent; color: var(--ink-soft); cursor: pointer; font-size: 13px; width: 26px; height: 26px; border-radius: 7px; flex: 0 0 auto; }
  .taskdel:hover { background: color-mix(in srgb, var(--ink) 10%, transparent); color: var(--ink); }
  .empty { color: var(--ink-soft); font-size: 14px; padding: 22px; text-align: center; }
  .remtime { font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--accent); min-width: 46px; font-weight: 600; flex: 0 0 auto; }

  .calpanel { max-width: 680px; }
  .calhead { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px; }
  .calmonth { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; min-width: 210px; text-align: center; }
  .calgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .caldow { text-align: center; font-size: 11px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 4px; }
  .calcell { aspect-ratio: 1; border: 1px solid var(--card-border); border-radius: 12px; background: var(--card); padding: 7px; cursor: pointer; position: relative; transition: border-color .12s ease; }
  .calcell:hover { border-color: var(--accent); }
  .calcell.pad { background: transparent; border: none; cursor: default; }
  .calcell.today { border-color: var(--accent); }
  .calcell.today .calnum { color: var(--accent); font-weight: 700; }
  .calcell.sel { box-shadow: 0 0 0 2px var(--accent); }
  .calnum { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .calbadge { position: absolute; bottom: 6px; right: 6px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px; background: var(--accent); color: var(--accent-ink); font-size: 10px; font-weight: 700; display: grid; place-items: center; }
  .daypanel { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--card-border); }
  .dayhead { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  #count { font-size: 12px; font-weight: 600; color: var(--ink-soft); background: var(--pill); padding: 3px 9px; border-radius: 999px; font-variant-numeric: tabular-nums; }
  .btn {
    appearance: none; border: 1px solid var(--chrome-border); background: transparent; color: var(--ink);
    height: 33px; border-radius: 9px; padding: 0 13px; font: inherit; font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: background .15s ease, transform .1s ease;
  }
  .btn:hover { background: color-mix(in srgb, var(--ink) 7%, transparent); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #add { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }
  #add:hover { background: color-mix(in srgb, var(--accent) 90%, #fff); }

  /* ---------- notes ---------- */
  .note {
    position: absolute; width: 250px; min-height: 200px;
    border-radius: 22px; background: var(--paper); color: var(--ink);
    border: 1px solid var(--card-border); box-shadow: var(--sh);
    transform: scale(1); transform-origin: center;
    transition: transform .46s cubic-bezier(.2,1.06,.28,1), box-shadow .3s ease;
    will-change: transform; display: flex; flex-direction: column;
    padding: 12px 22px 14px;
  }
  .note.lift { transition: box-shadow .16s ease, transform .16s ease; transform: scale(1.026); box-shadow: var(--sh-lift); }
  .note.sizing { transition: box-shadow .16s ease; box-shadow: var(--sh-lift); }
  .note.spawn { animation: pop .42s cubic-bezier(.2,1.1,.3,1); }
  .note.leaving { transition: transform .24s ease, opacity .24s ease; transform: scale(.9); opacity: 0; pointer-events: none; }
  @keyframes pop { 0% { transform: scale(.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .note .grip { position: absolute; top: 0; left: 0; right: 0; height: 30px; cursor: grab; }
  .note.lift .grip { cursor: grabbing; }

  /* one collapsing header row: hidden (zero space) until top-zone hover / menu open */
  .note .nhead {
    cursor: grab;
    display: flex; align-items: center; height: 0; opacity: 0; overflow: hidden;
    transition: height .16s ease, opacity .13s ease; position: relative; z-index: 5;
  }
  .note.hov .nhead,
  .note.menu-open .nhead, .note.type-open .nhead, .note.recording .nhead { height: 28px; opacity: 1; }
  .note .tools { display: flex; gap: 2px; }
  .tool {
    opacity: 1; border: none; background: transparent;
    color: color-mix(in srgb, var(--ink) 72%, transparent);
    width: 26px; height: 24px; border-radius: 7px; cursor: pointer; display: grid; place-items: center;
    transition: background .12s ease, color .12s ease;
  }
  .tool:hover { background: color-mix(in srgb, var(--ink) 14%, transparent); color: var(--ink); }
  .tool .chip { width: 15px; height: 15px; border-radius: 50%; background: var(--paper); box-shadow: inset 0 0 0 1px rgba(128,128,128,0.55); display: block; }
  .tool svg { width: 16px; height: 16px; }

  .note .titlerow { display: flex; align-items: flex-start; gap: 6px; }
  .note .titlerow .title { flex: 1; min-width: 0; }
  /* empty title takes no space until you hover the note (or are editing it) */
  .note:not(:hover):not(.editing) .titlerow.tempty { height: 0; overflow: hidden; opacity: 0; }
  .note .titlerow.tempty { opacity: .9; transition: opacity .15s ease; }
  .note .titlerow.tempty .title:empty::before { text-decoration: line-through; text-decoration-thickness: 1.5px; }
  .note .title {
    font-size: 18px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.25; color: var(--ink);
    outline: none; white-space: pre-wrap; overflow-wrap: anywhere; cursor: text; margin-top: 6px; margin-bottom: 7px;
  }
  .note .title:empty::before { content: "Title"; color: color-mix(in srgb, var(--ink) 34%, transparent); }

  .note .body {
    flex: 1; font-size: 14.5px; line-height: 1.52; letter-spacing: -0.003em; color: var(--ink-body);
    outline: none; overflow-wrap: anywhere; white-space: pre-wrap; cursor: text; overflow-y: auto;
  }
  .note .body:empty::before { content: "Start typing…"; color: color-mix(in srgb, var(--ink) 32%, transparent); }
  .note .body a { color: var(--link); text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; cursor: pointer; word-break: break-all; }
  .note .body a:hover { text-decoration-thickness: 2px; }
  .note .body a::selection { background: color-mix(in srgb, var(--link) 32%, transparent); }
  .note .body ::selection { background: color-mix(in srgb, var(--link) 26%, transparent); }
  .mp-font .fhint { font-size: 10px; font-weight: 500; color: var(--pop-ink-soft); margin-left: 7px; letter-spacing: 0; }
  .mp-actions { display: flex; gap: 6px; margin-top: 6px; }
  .mp-act { flex: 1; border: 1px solid var(--pop-border); background: transparent; color: var(--pop-ink); padding: 8px 6px; border-radius: 9px; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background .12s ease; }
  .mp-act:hover { background: color-mix(in srgb, var(--pop-ink) 9%, transparent); }
  .mp-act svg { width: 14px; height: 14px; }

  /* floating format toolbar (text selection) */
  #selbar {
    position: fixed; z-index: 9999; display: none; padding: 4px;
    border-radius: 11px; background: var(--pop-bg); border: 1px solid var(--pop-border);
    box-shadow: var(--sh-pop); animation: mpop .13s ease;
  }
  .selrow, .selsub { display: flex; gap: 1px; align-items: center; }
  .selsub { display: none; }
  .selsep { width: 1px; height: 20px; background: var(--pop-border); margin: 0 3px; flex: 0 0 auto; }
  .selbtn {
    min-width: 30px; height: 30px; padding: 0 8px; border: none; background: transparent;
    color: var(--pop-ink); border-radius: 8px; cursor: pointer; font-size: 14px;
    display: grid; place-items: center; font-family: inherit; line-height: 1;
  }
  .selbtn:hover { background: color-mix(in srgb, var(--pop-ink) 12%, transparent); }
  .selbtn.on { background: color-mix(in srgb, var(--accent) 34%, transparent); color: var(--pop-ink); }
  .selbtn .u { text-decoration: underline; } .selbtn .s { text-decoration: line-through; }
  .sellink { gap: 4px; }
  .selinput { width: 188px; height: 28px; border: 1px solid var(--pop-border); border-radius: 7px; background: transparent; color: var(--pop-ink); font: inherit; font-size: 13px; padding: 0 9px; outline: none; }
  .selinput:focus { border-color: var(--accent); }
  .selfont { min-width: 34px; height: 30px; border: none; background: transparent; color: var(--pop-ink); border-radius: 8px; cursor: pointer; font-size: 15px; }
  .selfont:hover { background: color-mix(in srgb, var(--pop-ink) 12%, transparent); }

  /* checklist */
  .note .ck { display: flex; align-items: flex-start; gap: 9px; margin: 4px 0; }
  .note .ck .cbox { flex: 0 0 auto; width: 18px; height: 18px; margin-top: 1px; border-radius: 6px; border: 1.8px solid color-mix(in srgb, var(--ink) 40%, transparent); cursor: pointer; position: relative; user-select: none; -webkit-user-select: none; transition: background .15s ease, border-color .15s ease; }
  .note .ck .cbox:hover { border-color: var(--accent); }
  .note .ck[data-checked="1"] .cbox { background: var(--accent); border-color: var(--accent); }
  .note .ck[data-checked="1"] .cbox::after { content: ""; position: absolute; left: 5.5px; top: 2px; width: 4px; height: 8px; border: solid var(--accent-ink); border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .note .ck .ctxt { flex: 1 1 auto; min-width: 0; outline: none; overflow-wrap: anywhere; line-height: 1.5; }
  .note .ck .ctxt:empty::before { content: "List item"; color: color-mix(in srgb, var(--ink) 34%, transparent); }
  .note .ck[data-checked="1"] .ctxt { text-decoration: line-through; opacity: .5; }

  .note .foot {
    flex: 0 0 auto; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--hair);
    font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0; display: flex; align-items: center; gap: 6px;
  }
  .note .foot .fdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .5; }

  .note .files { display: none; flex-wrap: wrap; gap: 8px; margin-top: 11px; }
  .att { position: relative; }
  .att.img img { width: 58px; height: 58px; object-fit: cover; border-radius: 9px; border: 1px solid var(--hair); display: block; cursor: pointer; }
  .att.doc { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border: 1px solid var(--hair); border-radius: 9px; background: color-mix(in srgb, var(--ink) 5%, transparent); cursor: pointer; font-size: 12px; color: var(--ink-body); }

      var edits = list.querySelectorAll('.tkedit');
      var target = edits[Math.min(focusIdx, edits.length - 1)];
      if (target) { target.focus(); caretToEnd(target); }
    }
  }
  var CAL_MON_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  function pad2(x) { return (x < 10 ? '0' : '') + x; }
  function ymd2(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function remsFor(n, key) { return (n.reminders || []).filter(function (r) { return r.date === key; }); }
  function buildCalBody(n, el) {
    n.reminders = n.reminders || [];
    var td = new Date();
    el._cal = { y: td.getFullYear(), m: td.getMonth(), sel: null };
    var cb = document.createElement('div'); cb.className = 'ntbody calbody';
    cb.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
    return cb;
  }
  function hourLabel(h) { var ap = h < 12 ? 'AM' : 'PM'; var hh = h % 12; if (hh === 0) hh = 12; return hh + ' ' + ap; }
  function remChip(r, n, el) {
    var c = document.createElement('div'); c.className = 'dchip';
    c.addEventListener('click', function (e) { e.stopPropagation(); });
    var tx = document.createElement('span'); tx.className = 'dchiptext'; tx.textContent = r.text;
    var del = document.createElement('button'); del.className = 'taskdel'; del.innerHTML = '✕';
    del.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
    del.addEventListener('click', function (e) { e.stopPropagation(); n.reminders = n.reminders.filter(function (x) { return x.id !== r.id; }); touch(n); save(); renderNoteRem(n, el); });
    c.appendChild(tx); c.appendChild(del); return c;
  }
  function openSlotInput(bodyS, n, el, date, time) {
    var ex = bodyS.querySelector('.dslotinput'); if (ex) { ex.focus(); return; }
    var inp = document.createElement('input'); inp.className = 'ntinput dslotinput'; inp.placeholder = 'New reminder';
    var committed = false;
    function commit() { if (committed) return; committed = true; var v = inp.value.trim(); if (v) { n.reminders.push({ id: 'r' + Date.now() + Math.floor(Math.random() * 999), date: date, time: time, text: v }); touch(n); save(); if (el._cal) el._cal.sel = null; } renderNoteRem(n, el); }
    inp.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
    inp.addEventListener('click', function (e) { e.stopPropagation(); });
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); commit(); } else if (e.key === 'Escape') { committed = true; renderNoteRem(n, el); } });
    inp.addEventListener('blur', commit);
    bodyS.appendChild(inp); inp.focus();
  }
  function renderNoteRem(n, el) {
    var cb = el.querySelector('.calbody'); if (!cb) return;
    var st = el._cal || (el._cal = (function () { var d = new Date(); return { y: d.getFullYear(), m: d.getMonth(), sel: null }; })());
    cb.innerHTML = '';
    if (st.sel) renderCalDay(cb, n, el, st); else renderCalMonth(cb, n, el, st);
  }
  function renderCalMonth(cb, n, el, st) {
    var head = document.createElement('div'); head.className = 'ncalhead';
    var prev = document.createElement('button'); prev.className = 'ncalnav'; prev.innerHTML = '‹';
    prev.addEventListener('click', function (e) { e.stopPropagation(); st.m--; if (st.m < 0) { st.m = 11; st.y--; } renderNoteRem(n, el); });
    var ml = document.createElement('div'); ml.className = 'ncalmonth'; ml.textContent = CAL_MON_FULL[st.m] + ' ' + st.y;
    var next = document.createElement('button'); next.className = 'ncalnav'; next.innerHTML = '›';
    next.addEventListener('click', function (e) { e.stopPropagation(); st.m++; if (st.m > 11) { st.m = 0; st.y++; } renderNoteRem(n, el); });
    head.appendChild(prev); head.appendChild(ml); head.appendChild(next); cb.appendChild(head);
    var grid = document.createElement('div'); grid.className = 'ncalgrid';
    ['S','M','T','W','T','F','S'].forEach(function (d) { var dh = document.createElement('div'); dh.className = 'ncaldow'; dh.textContent = d; grid.appendChild(dh); });
    var first = new Date(st.y, st.m, 1).getDay();
    var days = new Date(st.y, st.m + 1, 0).getDate();
    var todayKey = ymd2(new Date());
    for (var p = 0; p < first; p++) { var pd = document.createElement('div'); pd.className = 'ncalcell pad'; grid.appendChild(pd); }
    for (var dd = 1; dd <= days; dd++) {
      (function (dd) {
        var key = st.y + '-' + pad2(st.m + 1) + '-' + pad2(dd);
        var cell = document.createElement('div'); cell.className = 'ncalcell' + (key === todayKey ? ' today' : '');
        cell.appendChild(document.createTextNode(dd));
        if (remsFor(n, key).length) { var dot = document.createElement('span'); dot.className = 'ncaldot'; cell.appendChild(dot); }
        cell.addEventListener('click', function (e) { e.stopPropagation(); st.sel = key; renderNoteRem(n, el); });
        grid.appendChild(cell);
      })(dd);
    }
    cb.appendChild(grid);
  }
  function renderCalDay(cb, n, el, st) {
    var p2 = st.sel.split('-');
    var dObj = new Date(parseInt(p2[0], 10), parseInt(p2[1], 10) - 1, parseInt(p2[2], 10));
    var DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var head = document.createElement('div'); head.className = 'dhead';
    var back = document.createElement('button'); back.className = 'ncalnav'; back.innerHTML = '‹'; back.title = 'Back to month';
    back.addEventListener('click', function (e) { e.stopPropagation(); st.sel = null; renderNoteRem(n, el); });
    var t = document.createElement('div'); t.className = 'dtitle'; t.textContent = DOW[dObj.getDay()] + ', ' + CAL_MON[parseInt(p2[1], 10) - 1] + ' ' + parseInt(p2[2], 10);
    head.appendChild(back); head.appendChild(t); cb.appendChild(head);
    var dayRems = remsFor(n, st.sel);
    var untimed = dayRems.filter(function (r) { return !r.time; });
    if (untimed.length) {
      var us = document.createElement('div'); us.className = 'dslotbody dallday';
      untimed.forEach(function (r) { us.appendChild(remChip(r, n, el)); });
      cb.appendChild(us);
    }
    var tl = document.createElement('div'); tl.className = 'dtimeline';
    for (var h = 0; h < 24; h++) {
      (function (h) {
        var slot = document.createElement('div'); slot.className = 'dslot';
        var lbl = document.createElement('div'); lbl.className = 'dslottime'; lbl.textContent = hourLabel(h);
        var bodyS = document.createElement('div'); bodyS.className = 'dslotbody';
        dayRems.filter(function (r) { return r.time && parseInt(r.time.split(':')[0], 10) === h; }).forEach(function (r) { bodyS.appendChild(remChip(r, n, el)); });
        slot.addEventListener('click', function (e) { if (e.target.closest('.dchip')) return; openSlotInput(bodyS, n, el, st.sel, pad2(h) + ':00'); });
        slot.appendChild(lbl); slot.appendChild(bodyS); tl.appendChild(slot);
      })(h);
    }
    cb.appendChild(tl);
  }

  buildSelbar(); buildOverlay();
  document.addEventListener('selectionchange', showSelbarForSelection);
  document.addEventListener('pointerdown', function (e) {
    if (subMode && (!e.target.closest || !e.target.closest('#selbar'))) { exitSub(); hideSelbar(); }
  }, true);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      if (subMode) { exitSub(); hideSelbar(); }
      else if (histover && histover.classList.contains('open')) closeHistory();
      else if (expandedNote) closeExpand();
    }
  });
  loadArch();
  window.addEventListener('scroll', function () { if (selbar && selbar.style.display === 'flex') positionSelbar(); }, true);
  window.addEventListener('resize', function () { if (selbar && selbar.style.display === 'flex') positionSelbar(); });

  /* ---------- boot (must run after all declarations above) ---------- */
  function spawnTutorialNotes() {
    var w = window.innerWidth, h = window.innerHeight, now = Date.now();
    var seeds = [
      { fill: { kind: 'preset', id: 'yellow' }, font: DEFAULT_FONT, title: 'Welcome to Desk Notes 👋',
        text: '• Double-tap me to open the big editor\n• Hover me — a header appears up top\n• Tap the ○ circle for colors, fonts + options\n• Tap the ☰ lines to switch Note · Task · Calendar\n• Tap the 🎙 mic and speak — words appear at your cursor\n• Drag my header to move me — I snap to edges', dx: -330, dy: -110, w: 306, upd: now - 60000 },
      { type: 'task', fill: { kind: 'preset', id: 'paper' }, font: DEFAULT_FONT, title: 'Try a task list ✓',
        tasks: [
          { text: 'Check me off', done: false },
          { text: 'Press Enter to add another task', done: false },
          { text: 'Try ☰ → Calendar for reminders', done: false },
          { text: 'Delete me when you’re done', done: true }
        ], dx: 30, dy: -80, upd: now - 30000 }
    ];
    seeds.forEach(function (s, si) {
      notes.push({ id: 'n' + now + si + (s.fill.id || ''),
        x: Math.max(20, w / 2 + s.dx), y: Math.max(__top() + 8, h / 2 + s.dy),
        fill: s.fill, font: s.font, title: s.title, text: s.text || '',
        type: s.type, w: s.w, h: s.h, updated: s.upd, z: ++zTop,
        tasks: s.tasks ? s.tasks.map(function (t, ti) { return { id: 't' + now + si + '_' + ti, text: t.text, done: !!t.done }; }) : undefined });
    });
    renderAll(); save();
  }
  window.__addTutorial = spawnTutorialNotes; // native menu hook

  /* ---------- History: every note, live and deleted, searchable ---------- */
  var histover = null, histInput = null, histList = null;
  function noteHay(n) {
    return ((n.title || '') + ' ' + (n.text || '') + ' ' +
      (n.tasks || []).map(function (t) { return t.text; }).join(' ') + ' ' +
      (n.reminders || []).map(function (r) { return r.text; }).join(' ')).toLowerCase();
  }
  function histDate(ts) {
    try { return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
      new Date(ts).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); } catch (e) { return ''; }
  }
  function buildHistory() {
    histover = document.createElement('div'); histover.id = 'histover';
    var panel = document.createElement('div'); panel.className = 'histpanel';
    var head = document.createElement('div'); head.className = 'histhead';
    var h = document.createElement('div'); h.className = 'histtitle'; h.textContent = 'History';
    histInput = document.createElement('input'); histInput.className = 'histsearch'; histInput.placeholder = 'Search all notes…';
    histInput.addEventListener('input', renderHistoryList);
    var x = document.createElement('button'); x.className = 'histclose'; x.innerHTML = '✕'; x.title = 'Close';
    x.addEventListener('click', closeHistory);
    head.appendChild(h); head.appendChild(histInput); head.appendChild(x);
    histList = document.createElement('div'); histList.className = 'histlist';
    panel.appendChild(head); panel.appendChild(histList);
    histover.appendChild(panel);
    histover.addEventListener('pointerdown', function (e) { if (e.target === histover) closeHistory(); });
    document.body.appendChild(histover);
  }
  function renderHistoryList() {
    if (!histList) return;
    loadArch(); // shared across displays — render (and splice) against the freshest copy
    var q = (histInput.value || '').trim().toLowerCase();
    var rows = [];
    notes.forEach(function (n) { rows.push({ n: n, live: true, ts: n.updated || 0 }); });
    archive.forEach(function (n, i) { rows.push({ n: n, live: false, ai: i, ts: n.deletedAt || n.updated || 0 }); });
    rows.sort(function (a, b) { return b.ts - a.ts; });
    if (q) rows = rows.filter(function (r) { return noteHay(r.n).indexOf(q) >= 0; });
    histList.innerHTML = '';
    if (!rows.length) {
      var em = document.createElement('div'); em.className = 'histempty';
      em.textContent = q ? 'No notes match “' + q + '”' : 'Nothing here yet';
      histList.appendChild(em); return;
    }
    rows.forEach(function (r) {
      var n = r.n;
      var row = document.createElement('div'); row.className = 'histrow' + (r.live ? '' : ' dead');
      var chip = document.createElement('span'); chip.className = 'histchip' + (r.live ? ' live' : '');
      chip.textContent = r.live ? 'Active' : 'Deleted';
      var mid = document.createElement('div'); mid.className = 'histmid';
      var t = document.createElement('div'); t.className = 'histname';
      t.textContent = (n.title || '').trim() || ((n.text || '').trim().split('\n')[0] || 'Untitled').slice(0, 40);
      var s = document.createElement('div'); s.className = 'histsnip';
      var snip = (n.type === 'task') ? (n.tasks || []).map(function (tk) { return tk.text; }).join(' · ')
               : (n.type === 'cal') ? (n.reminders || []).map(function (rm) { return rm.text; }).join(' · ')
               : (n.text || '');
      s.textContent = (snip || '').slice(0, 90);
      var d = document.createElement('div'); d.className = 'histwhen'; d.textContent = (r.live ? 'Edited ' : 'Deleted ') + histDate(r.ts);
      mid.appendChild(t); if (s.textContent) mid.appendChild(s); mid.appendChild(d);
      var acts = document.createElement('div'); acts.className = 'histacts';
      function actBtn(label, cls, fn) {
        var b = document.createElement('button'); b.className = 'histbtn ' + (cls || ''); b.textContent = label;
        b.addEventListener('click', function (e) { e.stopPropagation(); fn(); }); acts.appendChild(b);
      }
      if (r.live) {
        actBtn('Open', '', function () {
          if (isPanel()) { postPanel({ cmd: 'openNote', id: n.id }); return; }
          closeHistory();
          var el = desk.querySelector('.note[data-id="' + n.id + '"]');
          if (el) setTimeout(function () { openExpand(el, n); }, 60);
        });
      } else {
        actBtn('Restore', '', function () {
          archive.splice(r.ai, 1); saveArch();
          n.deletedAt = undefined; n.z = ++zTop;
          n.x = Math.max(20, window.innerWidth / 2 - 125); n.y = Math.max(__top() + 8, window.innerHeight / 2 - 115);
          notes.push(n); save(); renderAll(); renderHistoryList(); toast('Note restored');
          postPanel({ cmd: 'changed' });
        });
        actBtn('Delete Forever', 'danger', function () {
          archive.splice(r.ai, 1); saveArch(); renderHistoryList(); toast('Deleted forever');
          postPanel({ cmd: 'changed' });
        });
      }
      row.appendChild(chip); row.appendChild(mid); row.appendChild(acts);
      histList.appendChild(row);
    });
  }
  function isPanel() { return document.documentElement.classList.contains('panelmode'); }
  function postPanel(msg) { try { window.webkit.messageHandlers.panel.postMessage(msg); } catch (e) {} }
  function openHistory(focusSearch) {
    if (!histover) buildHistory();
    closeMenu(); closeType();
    if (!isPanel() && expandedNote) closeExpand();
    histover.classList.add('open');
    histInput.value = ''; renderHistoryList();
    if (focusSearch) setTimeout(function () { histInput.focus(); }, 120);
  }
  function closeHistory() {
    if (isPanel()) { postPanel({ cmd: 'close' }); return; } // settings window: hide the window, stay ready
    if (histover) histover.classList.remove('open');
  }
  window.__openHistory = openHistory;
  // settings window edited storage -> desktop view re-reads and re-renders
  window.__reloadNotes = function () {
    loadArch();
    try { var r = localStorage.getItem(STORE); if (r) notes = JSON.parse(r); } catch (e) {}
    notes.forEach(function (n) { normFill(n); if (n.z && n.z > zTop) zTop = n.z; });
    renderAll();
  };
  window.__expandNoteById = function (id) {
    var n = noteById(id); var el = desk.querySelector('.note[data-id="' + id + '"]');
    if (n && el && !expandedNote) openExpand(el, n);
  };
  // the desktop overlay is click-through away from the notes, so a click on the wallpaper or another
  // app never reaches the page — the native side calls this to close any dropdown left hanging open
  window.__closePops = function () {
    closeMenu(); closeType();
    if (expandedNote) { var xb = expandedNote.querySelector('.exbar'); if (xb && xb._closePops) xb._closePops(); }
  };

  // reminders fire real notifications when due (checked every 30s)
  function checkReminders() {
    if (document.documentElement.classList.contains('panelmode')) return; // settings window doesn't fire reminders
    var now = new Date();
    var today = ymd2(now);
    var hm = pad2(now.getHours()) + ':' + pad2(now.getMinutes());
    var dirty = false;
    notes.forEach(function (n) {
      (n.reminders || []).forEach(function (r) {
        if (r.fired || !r.time || r.date !== today || r.time > hm) return;
        r.fired = true; dirty = true;
        var title = (n.title || '').trim() || 'Reminder';
        try { window.webkit.messageHandlers.notify.postMessage({ title: title, body: r.text }); }
        catch (e) { toast('⏰ ' + r.text); }
      });
    });
    if (dirty) save();
  }
  setInterval(checkReminders, 30000);
  setTimeout(checkReminders, 4000);
  scheduleBackup(); // ensure the backup file exists from first launch

  var saved = load();
  if (saved && saved.length) {
    notes = saved; notes.forEach(function (n) { normFill(n); if (n.z && n.z > zTop) zTop = n.z; }); renderAll();
  } else {
    spawnTutorialNotes();
  }

  // losing window focus ends editing so hover/editing controls never linger
  window.addEventListener('blur', function () {
    try { if (document.activeElement && document.activeElement.blur) document.activeElement.blur(); } catch (e) {}
  });

  // native shell hook: click landed outside the editor -> minimize it
  window.__closeExpand = function () { closeExpand(); };

  // native shell hook: the page is back on the desktop overlay, so the deferred fit can measure for real
  window.__fitAfterRestore = function () {
    var id = pendingFit; pendingFit = null; if (!id) return;
    requestAnimationFrame(function () {
      var el = desk.querySelector('.note[data-id="' + id + '"]'), n = noteById(id);
      if (el && n) fitCollapsed(el, n);
    });
  };

  // native shell hook: menu-bar "New Note"
  window.__addNote = function () {
    addNote(window.innerWidth / 2 - 125 + (Math.random() * 70 - 35),
            Math.max(__top(), window.innerHeight / 2 - 115 + (Math.random() * 50 - 25)));
  };

  // native shell hook: window frame changed (display plugged/unplugged) -> pull every note back into view
  window.__clampAll = function () {
    notes.forEach(function (n) {
      var el = desk.querySelector('.note[data-id="' + n.id + '"]');
      if (el && !el.classList.contains('expanded')) clampToScreen(n, el);
    });
  };

  syncTheme(); updateCount();
  setInterval(function () {
    Array.prototype.slice.call(desk.querySelectorAll('.note')).forEach(function (el) {
      var id = el.dataset.id, n = notes.filter(function (x) { return x.id === id; })[0];
      if (n) refreshFoot(el, n);
    });
  }, 30000);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
    if (!document.documentElement.getAttribute('data-theme')) syncTheme();
  });
})();
</script>
